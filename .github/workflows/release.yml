name: Pre-release Build

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build and Release
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Build Windows Executable
        run: |
          go build -ldflags="-H windowsgui" -o QAA-AirType-Go.exe ./cmd/airtype

      - name: Generate Tag Name
        id: tag
        shell: bash
        run: |
          echo "tag=v0.0.0-dev.${{ github.run_number }}" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Pre-release (Build ${{ github.run_number }})"
          body: |
            Automatic pre-release build for commit `${{ github.sha }}`.
            Built on ${{ steps.tag.outputs.date }}.
          prerelease: true
          draft: false
          files: |
            QAA-AirType-Go.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
