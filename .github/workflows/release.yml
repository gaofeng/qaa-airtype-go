name: Release Build

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build and Release
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Build Windows Executable
        run: |
          go build -ldflags="-H windowsgui" -o QAA-AirType-Go.exe ./cmd/airtype

      - name: Generate Tag and Release Notes
        id: tag
        shell: bash
        run: |
          latest_tag=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)

          if [ -z "$latest_tag" ]; then
            new_tag="v1.0.0"
            changelog=$(git log --oneline --no-decorate)
          else
            major=$(echo "$latest_tag" | sed 's/v\([0-9]*\)\.\([0-9]*\)\.\([0-9]*\)/\1/')
            minor=$(echo "$latest_tag" | sed 's/v\([0-9]*\)\.\([0-9]*\)\.\([0-9]*\)/\2/')
            patch=$(echo "$latest_tag" | sed 's/v\([0-9]*\)\.\([0-9]*\)\.\([0-9]*\)/\3/')
            new_patch=$((patch + 1))
            new_tag="v${major}.${minor}.${new_patch}"
            changelog=$(git log ${latest_tag}..HEAD --oneline --no-decorate)
          fi

          date=$(date +'%Y-%m-%d %H:%M:%S')

          echo "tag=${new_tag}" >> $GITHUB_OUTPUT
          echo "date=${date}" >> $GITHUB_OUTPUT
          {
            echo "changelog<<EOF"
            echo "$changelog"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "${{ steps.tag.outputs.tag }}"
          body: |
            ## 更新内容
            ${{ steps.tag.outputs.changelog }}

            Built on ${{ steps.tag.outputs.date }}.
          prerelease: false
          draft: false
          files: |
            QAA-AirType-Go.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
